on:
  push:
    tags:
      - 'v*'
name: Release Binaries
permissions:
  contents: write
  packages: write
jobs:
  build-macos:
    strategy:
      matrix:
        go-version: ["1.25"]
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: 1
    steps:
      - name: Install Go
        uses: actions/setup-go@v2
        with:
          go-version: ${{ matrix.go-version }}
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Calculate git version and add it to the environment
        shell: bash
        run: |
          echo "GIT_VERSION=$(git describe --tags)" >> $GITHUB_ENV
      - name: Build macos binary
        run: |
          go build -o build/macos/smimesign -ldflags "-X main.versionString=${{ env.GIT_VERSION }}" .
          go build -o build/macos/git-x509-cert ./cmd/git-x509-cert
          mkdir -p build/macos/package/docs build/macos/package/examples
          build/macos/smimesign -h > build/macos/package/docs/smimesign-help.txt 2>&1
          build/macos/git-x509-cert -h > build/macos/package/docs/git-x509-cert-help.txt 2>&1
          cp README.md LICENSE.md build/macos/package/docs/
          cp examples/smimesign-pkcs11-wrapper.sh build/macos/package/examples/
      - name: Tar the macOS binary
        run: |
          cp build/macos/smimesign build/macos/package/smimesign
          cp build/macos/git-x509-cert build/macos/package/git-x509-cert
          cd build/macos && tar -czvf smimesign-macos-${{ env.GIT_VERSION }}.tgz -C package .
      - name: Upload macOS files to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/macos/smimesign-macos-${{ env.GIT_VERSION }}.tgz
  build-linux:
    strategy:
      matrix:
        go-version: ["1.25"]
        os: [ubuntu-latest]
        arch: [amd64, 386]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: 1
      GOARCH: ${{ matrix.arch }}
    steps:
      - name: Install Go
        uses: actions/setup-go@v2
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib libc6-dev-i386
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Calculate git version and add it to the environment
        shell: bash
        run: |
          echo "GIT_VERSION=$(git describe --tags)" >> $GITHUB_ENV
      - name: Calculate bare git version and add it to the environment
        shell: bash
        run: |
          if [[ "${GIT_VERSION}" =~ ^v?([[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+)(-[A-za-z0-9-]*)? ]]; then
            echo "BARE_GIT_VERSION=${BASH_REMATCH[1]}" >> $GITHUB_ENV
          else
            echo "Could not calculate the bare git version for: ${GIT_VERSION}"
            exit 1
          fi
      - name: Build linux binary
        run: |
          go build -o build/linux/smimesign-${{ matrix.arch }} -ldflags "-X main.versionString=${{ env.GIT_VERSION }}" .
          GOOS=linux GOARCH=${{ matrix.arch }} CGO_ENABLED=0 go build -o build/linux/git-x509-cert-${{ matrix.arch }} ./cmd/git-x509-cert
          mkdir -p build/linux/package-${{ matrix.arch }}/docs build/linux/package-${{ matrix.arch }}/examples
          build/linux/smimesign-${{ matrix.arch }} -h > build/linux/package-${{ matrix.arch }}/docs/smimesign-help.txt 2>&1
          build/linux/git-x509-cert-${{ matrix.arch }} -h > build/linux/package-${{ matrix.arch }}/docs/git-x509-cert-help.txt 2>&1
          cp README.md LICENSE.md build/linux/package-${{ matrix.arch }}/docs/
          cp examples/smimesign-pkcs11-wrapper.sh build/linux/package-${{ matrix.arch }}/examples/
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            cp build/linux/smimesign-${{ matrix.arch }} build/linux/smimesign
            cp build/linux/git-x509-cert-${{ matrix.arch }} build/linux/git-x509-cert
            mkdir -p build/linux/docs
            cp build/linux/package-${{ matrix.arch }}/docs/smimesign-help.txt build/linux/docs/smimesign-help.txt
            cp build/linux/package-${{ matrix.arch }}/docs/git-x509-cert-help.txt build/linux/docs/git-x509-cert-help.txt
          fi
      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "${HOME}/go/bin" >> $GITHUB_PATH
      - name: Build RPM package
        if: ${{ matrix.arch == 'amd64' }}
        run: |
          VERSION=${{ env.BARE_GIT_VERSION }} nfpm package -p rpm --target build/linux/smimesign-${{ env.BARE_GIT_VERSION }}-1.x86_64.rpm
      - name: Tar the Linux binary
        run: |
          cp build/linux/smimesign-${{ matrix.arch }} build/linux/package-${{ matrix.arch }}/smimesign
          cp build/linux/git-x509-cert-${{ matrix.arch }} build/linux/package-${{ matrix.arch }}/git-x509-cert
          cd build/linux && tar -czvf smimesign-linux-${{ matrix.arch }}-${{ env.GIT_VERSION }}.tgz -C package-${{ matrix.arch }} .
      - name: Upload Linux files to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/linux/smimesign-linux-${{ matrix.arch }}-${{ env.GIT_VERSION }}.tgz
            ${{ (matrix.arch == 'amd64' && format('build/linux/smimesign-{0}-1.x86_64.rpm', env.BARE_GIT_VERSION)) || '' }}
  build-windows:
    strategy:
      matrix:
        go-version: ["1.25"]
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: 1
      PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}
    steps:
      - name: Install Go
        uses: actions/setup-go@v2
        with:
          go-version: ${{ matrix.go-version }}
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Calculate git version and add it to the environment
        shell: bash
        run: |
          echo "GIT_VERSION=$(git describe --tags)" >> $GITHUB_ENV
      - name: Calculate bare git version and add it to the environment
        shell: bash
        run: |
          if [[ "${GIT_VERSION}" =~ ^v?([[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+)(-[A-za-z0-9-]*)? ]]
          then
            echo "BARE_GIT_VERSION=${BASH_REMATCH[1]}" >> $GITHUB_ENV
          else
            echo "Could not calculate the bare git version (e.g. \`v1.1.0-rc1-28-g8a54734\` -> \`1.1.0\`) for: ${GIT_VERSION}"
            exit 1
          fi
      - name: Build binaries
        shell: bash
        run: |
          GOOS=windows GOARCH=amd64 go build -o build/amd64/smimesign.exe -ldflags "-X main.versionString=${{ env.GIT_VERSION }}" .
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o build/amd64/git-x509-cert.exe ./cmd/git-x509-cert
      - name: Build offline documentation
        shell: bash
        run: |
          mkdir -p build/amd64/docs
          ./build/amd64/smimesign.exe -h > build/amd64/docs/smimesign-help.txt 2>&1
          ./build/amd64/git-x509-cert.exe -h > build/amd64/docs/git-x509-cert-help.txt 2>&1
          cp README.md LICENSE.md build/amd64/docs/
      - name: Sign binaries
        if: ${{ env.PFX_PASSWORD != '' }}
        run: |
          .\windows-installer\signtool.exe sign /tr http://timestamp.digicert.com /td sha256 /fd sha256 /p ${{ env.PFX_PASSWORD }} /f windows-installer\codesign.pfx build\amd64\smimesign.exe
          .\windows-installer\signtool.exe sign /tr http://timestamp.digicert.com /td sha256 /fd sha256 /p ${{ env.PFX_PASSWORD }} /f windows-installer\codesign.pfx build\amd64\git-x509-cert.exe
      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress -y
      - name: Create installer (EXE)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path build\installer | Out-Null
          $env:GIT_VERSION = "${{ env.GIT_VERSION }}"
          $env:BARE_GIT_VERSION = "${{ env.BARE_GIT_VERSION }}"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" windows-installer\inno-setup-smimesign-installer.iss
      - name: Sign installer
        if: ${{ env.PFX_PASSWORD != '' }}
        run: |
          .\windows-installer\signtool.exe sign /tr http://timestamp.digicert.com /td sha256 /fd sha256 /p ${{ env.PFX_PASSWORD }} /f windows-installer\codesign.pfx build\installer\smimesign-windows-${{ env.GIT_VERSION }}.exe
      - name: Create zip archives for release upload
        shell: bash
        run: |
          mkdir -p build/amd64/package/docs
          cp build/amd64/smimesign.exe build/amd64/package/smimesign.exe
          cp build/amd64/git-x509-cert.exe build/amd64/package/git-x509-cert.exe
          cp build/amd64/docs/* build/amd64/package/docs/
          powershell -Command "Compress-Archive -Path build/amd64/package/* -DestinationPath build/amd64/smimesign-windows-amd64-${{ env.GIT_VERSION }}.zip"
      - name: Upload Windows files to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/amd64/smimesign-windows-amd64-${{ env.GIT_VERSION }}.zip
            build/installer/smimesign-windows-${{ env.GIT_VERSION }}.exe
  build-container-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Calculate git version and add it to the environment
        shell: bash
        run: |
          echo "GIT_VERSION=$(git describe --tags)" >> $GITHUB_ENV
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_VERSION=${{ env.GIT_VERSION }}
